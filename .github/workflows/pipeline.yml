name: .NET CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "build/**"
      - "**.csproj"
      - "**.sln"
      - "!**.github/workflows/pipeline.yml"
  workflow_dispatch:

env:
  NUGET_FEED_URL: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
  PACKAGE_VERSION: 1.0.${{ github.run_number }}
  PROJECT_PATH: src/Pat.Utils/Pat.Utils.csproj
  
jobs:
  build-pack-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6     

      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "${{ env.NUGET_FEED_URL }}"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage"
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: '**/TestResults/coverage.cobertura.xml'

      - name: Generate HTML coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: '**/coverage.cobertura.xml'
          targetdir: './coverage-report'
          reporttypes: 'HtmlInline'
            
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: ./coverage-report

      - run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --no-build -o ./artifacts -p:PackageVersion=${{ env.PACKAGE_VERSION }}

      - name: Push package
        run: dotnet nuget push "./artifacts/*.nupkg" --source github --skip-duplicate

          
          
